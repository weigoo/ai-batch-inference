apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker

spec:
  #replicas: 2

  selector:
    matchLabels:
      app: worker

  template:
    metadata:
      labels:
        app: worker

    spec:
      containers:
        - name: worker
          image: ai-batch-inference-worker
          imagePullPolicy: Never

          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          env:
            - name: REDIS_HOST
              value: redis