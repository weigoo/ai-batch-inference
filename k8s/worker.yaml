apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker

spec:
  # Replicas should be managed by KEDA ScaledObject, not set here
  # Commenting out to allow KEDA autoscaling to work properly

  selector:
    matchLabels:
      app: worker

  template:
    metadata:
      labels:
        app: worker

    spec:
      containers:
        - name: worker
          image: ai-batch-inference-worker
          imagePullPolicy: Never

          env:
            - name: REDIS_HOST
              value: redis
            - name: LOG_LEVEL
              value: "INFO"
            - name: INFERENCE_TIMEOUT
              value: "300"
            - name: MAX_BATCH_SIZE
              value: "1000"
            - name: MAX_TEXT_LENGTH
              value: "5000"
            - name: WORKER_POLLING_INTERVAL
              value: "2"
            - name: WORKER_MAX_RETRIES
              value: "3"
            - name: WORKER_RETRY_BACKOFF
              value: "2.0"

          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          # Workers may not have HTTP endpoints, so we use startup probe
          # to give enough time for model loading
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test -f /tmp/worker_ready && ps aux | grep 'python.*worker' | grep -v grep"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 30
            failureThreshold: 60

      # Termination grace period for graceful shutdown
      terminationGracePeriodSeconds: 60
