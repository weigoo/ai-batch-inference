apiVersion: apps/v1
kind: Deployment
metadata:
  name: api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: ai-batch-inference-api
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          env:
            - name: REDIS_HOST
              value: redis
            - name: LOG_LEVEL
              value: "INFO"
            - name: INFERENCE_TIMEOUT
              value: "300"
            - name: MAX_BATCH_SIZE
              value: "1000"
            - name: MAX_TEXT_LENGTH
              value: "5000"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

---

apiVersion: v1
kind: Service
metadata:
  name: api-service

spec:
  type: NodePort

  selector:
    app: api

  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30007
