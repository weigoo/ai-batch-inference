apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config

data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: "api"

        static_configs:
          - targets:
              - api-service:8000

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
        - name: prometheus

          image: prom/prometheus

          args:
            - "--config.file=/etc/prometheus/prometheus.yml"

          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus

      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config

---

apiVersion: v1
kind: Service
metadata:
  name: prometheus-service

spec:
  type: NodePort

  selector:
    app: prometheus

  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090